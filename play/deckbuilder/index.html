<html>
<head>
<meta charset="utf8" />
<title>Roguelike Deckbuilders Have One Good Part</title>
<style>
body {
	background: floralwhite;
}
main {
	margin: 30px auto;
	width: 666px;
	max-width: 90vw;
	display: flex;
	flex-direction: column;
	gap: 1rem;
	font-size: 15px;
	font-family: monospace;
	text-align: center;	
}
h1 {
	color: rebeccapurple;
	font-family: serif;
	font-weight: 900;
	margin: 0;
	font-size: 4rem;
	line-height: 2rem;
	letter-spacing: -4px;
}
h2 {
	color: plum;
	font-family: cursive;
	font-weight: 400;
	margin: 0;
	font-size: 2rem;
	line-height: 2rem;
}
h4 {
	font-family: serif;
}
#cards {
	display: flex;
	flex-direction: row;
	gap: 1rem;
	margin: 1rem 0;
}
.card {
	position: relative;
	width: 30%;
	max-height: auto;
	overflow-y: scroll;
	aspect-ratio: 2/3;
	background: lightgrey;
	border: 3px solid black;
	border-radius: 15px;
	padding: 1rem; 
	cursor: pointer;
	display: flex;
	flex-direction: column;
	gap: 1rem;
}
.type {
	position: absolute;
	bottom: 0;
	left: 0;
	padding: 3px 5px;
	border-radius: 50%;
	border: 2px solid grey;
	background: white;
}
.value {
	position: absolute;
	bottom: 0;
	right: 0;
	padding: 3px 5px;
	border-radius: 50%;
	border: 2px solid grey;
	background: darkred;
	color: white;
}
.card svg {
	width: 100%;
	aspect-ratio: 4/5;
	max-height: 50%;
	grid-area: img;
}
.card h4 {
	grid-area: name;
	margin: 0;
}
.card p {
	grid-area: desc;
	margin: 0;
}
.hidden {
	display: none;
}
#shuffle {
	text-align: center;
}
#damage {
	display: flex;
	flex-direction: column;
	font-size: 6rem;
	font-weight: 900;
}
#game {
	height: 400px;
}
ol {
text-align: left;
}
button {
	font-family: monospace;
	font-size: 2rem;
	cursor: pointer;
}
</style>
<body>
	<main>
	<h1>Roguelike Deckbuilders</h1>
	<h2>Have One Good Part</h2>
	<section id="game">	
	<span id="goal"></span>
	<div id="shuffle" class="hidden">
		<span id="damage"></span>
		<button id="continue" onclick="draw()">KEEP GOING!</span>
		<button id="restart" onclick="reset()" class="hidden">TRY AGAIN!</span>
	</div>
	<div id="draw">	
		<div id="cards">
		</div>
		<b><span id="deckTotal">5</span> cards in deck:</b><select id="deck"></select>
	</div>
	</section>
	<section id="manifesto">
		<ol>
			<li>Not all roguelike deckbuilders have to be <i>Slay the Spire</i> clones</li>
			<li>Those that are should admit that the best part is when you are presented with three cards, and have to pick one</li>
			<li>That part can be the whole game</li>
		</ol>
		<p>-<a href="https://aTylerRobertson.com">Tyler</a></p>
	</section>	
	</main>
	<script>
		let goal = 100;
		let round = 0;

		const types = ["slap","splash","rewind","acid","burn","clone","poison","cement","cloud","campfire"];
		
		const adjectives = {
			slap: ["Bouncy","Thick","Meaty","Hefty","Swole","Terrifying","Normal","Rusty","Old","New"],
			splash: ["Electrifying","Reverb","Echoing","Loud","Resounding"],
			rewind: ["Fwrrrrp","Bzzzzrt","sdrawkcaB","Frobozz","???"],
			acid: ["Melting", "Dripping","Ruinous","Stinky"],
			burn: ["Flaming", "Blazing", "Lit", "Bright"],
			clone: ["Experimental","Specimen","Test Tube","Space"],
			poison: ["Neon", "Dipped", "Scented", "Venom", "Sample"],
			cement: ["Heavy", "Weighted", "Doomed", "Drowned", "Sinking"],
			cloud: ["Happy", "Light", "Lifting", "Fizzy", "High", "Highest", "Top"],
			campfire: ["Forested", "Woodland", "Treetop", "Smokey", "Shadowed"],
		};

		const items = {
			slap: ["Sword", "Mace", "Club", "Axe", "Hammer", "Hand", "Fist", "Boots"],
			splash: ["Amp","Megaphone","Shout","Cry","Roar"],
			rewind: ["!!!", "Backwards", "...Again!", "Do-over", "???"],
			acid: ["Accident", "Spill", "Curse", "Eater", "Devourer"],
			burn: ["Torch", "Missile", "Rocket", "Fodder", "Bomb"], 
			clone: ["Generator","Duplicator","Teleporter","Machine","Device"],
			poison: ["Poison", "Potion", "Dagger", "Snake", "Toad"],
			cement: ["Shoes", "Block", "Brick", "Jacket", "Chains"],
			cloud: ["Bird", "Sky", "Bubbles", "Peak", "Goat", "Cloud"],
			campfire: ["Camp", "Outpost", "Watchtower", "Tower", "Lookout"],
		};
			
		const emoji = {
			slap: '✋',
			splash: '🌊',
			rewind: '⏪',
			acid: '☠️',
			burn: '🔥',
			clone: '🧬',
			poison: '🤢',
			cement: '🧱',
			cloud: '☁️',
			campfire: '🚬',
		};

		const color = {
			slap: 'orangered',
			splash: 'royalblue',
			rewind: 'antiquewhite',
			acid: 'yellowgreen',
			burn: 'red',
			clone: 'pink',
			poison: 'springgreen',
			cement: 'slategrey',
			cloud: 'snow',
			campfire: 'whitesmoke',
		};

		const defaultCard = {
			name: "Starter Card",
			type: "slap",
			value: 1,
		};

		const deck = [];
		
		const shuffle = () => {
			round+=1;
			deck.sort((a,b) => {
				if (a.type == "cement") return false;
				if (a.type == "cloud") return true;
				return Math.random() > 0.5;		
			});

			let damage = 0;
			let acid = 0;
			const poison = deck.filter((card) => card.type == "poison").length;
			const campfire = deck.filter((card) => card.type == "ash").length;
			
			let i = 0;

			const playCard = (index) => {
				card = deck[index];
				// Calculate damage
                if (card.type == "rewind" && index>0) playCard(index-1);
                if (card.type == "slap" || card.type == "cement" || card.type == "cloud") damage += card.value;
                if (card.type == "splash" && index>0) damage += deck[index-1].value*card.value;
                if (card.type == "acid") deck.splice(-1,1);
                if (card.type == "burn") {damage += card.value*3; deck[index].value=0; deck[index].type="ash";}
                if (card.type == "clone" && index>0) deck.push({...deck[index-1]});
                if (card.type == "poison") damage += poison;
                if (card.type == "campfire") damage += campfire*card.value;
			}

			while (i < deck.length) {
				// show damage UI
				document.querySelector("#shuffle").classList.remove("hidden");
				document.querySelector("#draw").classList.add("hidden");

				playCard(i);
				i++;
				
				// Show damage
				document.querySelector("#damage").innerText = `${damage}!`;
				
				if (round==5 && damage < goal) {
					document.querySelector("#continue").classList.add("hidden");
					document.querySelector("#restart").classList.remove("hidden");
				} else {
					document.querySelector("#continue").classList.remove("hidden");
                    document.querySelector("#restart").classList.add("hidden");
				}
				
				if (round == 5 && damage >= goal) {
					goal = goal * 3;
					round = 0;
				}
			};
			const left = 5-round;
			document.querySelector("#goal").innerText = `Goal: ${goal} ${left > 0 ? `in ${left} round${left==1?'':'s'}` : 'now!'}`; 
		}

		const addCard = (card) => {
			deck.push({...card});
			shuffle();
			document.querySelector("#deckTotal").innerText = deck.length;
		}

		const draw = () => {
			// Update deck list UI
			const opt = document.createElement("option");
			const deckList = document.querySelector("#deck");
			deckList.innerHTML="";
			deck.forEach((card) => {
				opt.innerText = `${card.name} - ${card.type} - ${card.value}`;
				deckList.prepend(opt);
			});
			const cardOptions = document.querySelector("#cards");
			cardOptions.innerHTML = "";
			// Make new cards!
			for (let i=0; i<3; i++) {
				const type = types[Math.floor(Math.random()*types.length)];
				const name1 = adjectives[type][Math.floor(Math.random()*adjectives[type].length)];
				const name2 = items[type][Math.floor(Math.random()*items[type].length)];
				const desc = type == "rewind" ? "Rewind cards <b>replay the previous card</b> in the deck" 
					: type == "slap" ? "Slap cards just deal <b>damage</b>"
					: type == "splash" ? "Splash cards <b>multiply</b> the previous card's damage"
					: type == "acid" ? "Acid cards <b>destroy the bottom card</b> in the deck each time you shuffle"
					: type == "burn" ? "Burn cards <b>deal triple damage</b>, but <b>turn to useless ash</b>"
					: type == "clone" ? "Clone cards create a <b>copy</b> of the previous card in the deck"
					: type == "poison" ? "Poison cards deal damage <b>equal to the number of poison cards</b> in the deck"
					: type == "cement" ? "Cement cards <b>sink to the bottom</b> of the deck"
					: type == "cloud" ? "Cloud cards <b>rise to the top</b> of the deck"
					: type == "campfire" ? "Smoking cards <b>deal more damage for each ash card</b> in the deck"
					: "";
				const newCard = {
					name: `${name1} ${name2}`,
					type,
					value: type == "rewind" || type == "clone" || type == "poison" ? 1 : Math.round(Math.random()*4)+1
				};
				if (type == "splash") newCard.value == Math.min(2,newCard.value);
				const newCardElem = document.createElement("div");
				newCardElem.classList.add("card");
				newCardElem.innerHTML=`<svg><rect width="100%" height="100%" fill="${color[type]}"/></svg>
                <h4>${newCard.name}</h4><b class="type">${emoji[type]}</b><b class="value">${newCard.value}</b><p>${desc}</p>`;
				newCardElem.addEventListener("click", () => addCard({...newCard}));
				cardOptions.appendChild(newCardElem);

				document.querySelector("#shuffle").classList.add("hidden");
				document.querySelector("#draw").classList.remove("hidden");
			}			
		}

		const reset = () => {
            const defaultCards = new Array(5).fill({...defaultCard});
            deck.splice(0,deck.length);
            deck.push(...defaultCards);
            goal=25;
            round=-2;
            draw(); 
        }

        reset();
	</script>
</body>
